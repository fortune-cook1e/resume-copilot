name: Deploy to Aliyun

on:
  push:
    branches:
      - master # 推送到 master 分支时触发
  workflow_dispatch: # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login to Aliyun Container Registry (ACR)
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          # namespace: ${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      # 4. Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/resume-copilot:latest
            ${{ secrets.ALIYUN_REGISTRY }}/resume-copilot:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.APP_URL }}

      # 5. Copy docker-compose file to server
      - name: Copy docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_SSH_USER }}
          password: ${{ secrets.ALIYUN_SSH_PASSWORD }}
          port: ${{ secrets.ALIYUN_SSH_PORT || 22 }}
          source: "docker-compose.prod.yml"
          target: ${{ secrets.ALIYUN_APP_DIR }}

      # 6. Deploy to Aliyun Server
      - name: Deploy to Aliyun Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_SSH_USER }}
          # key: ${{ secrets.ALIYUN_SSH_KEY }}
          password: ${{ secrets.ALIYUN_SSH_PASSWORD }}
          port: ${{ secrets.ALIYUN_SSH_PORT || 22 }}
          script: |
            # Navigate to app directory
            cd ${{ secrets.ALIYUN_APP_DIR }} || exit 1

            # Export environment variables for docker-compose
            export ALIYUN_REGISTRY="${{ secrets.ALIYUN_REGISTRY }}"

            # Login to Aliyun ACR
            echo "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}" | docker login \
              --username ${{ secrets.ALIYUN_REGISTRY_USERNAME }} \
              --password-stdin \
              ${{ secrets.ALIYUN_REGISTRY }}

            # Pull latest image
            docker pull ${{ secrets.ALIYUN_REGISTRY }}/resume-copilot:latest

            # Stop and remove old app container (keep database running)
            docker compose -f docker-compose.prod.yml down app

            # Run database migrations
            echo "📦 Running database migrations..."
            docker compose -f docker-compose.prod.yml run --rm app sh -c "npx drizzle-kit push"

            # Start new containers
            docker compose -f docker-compose.prod.yml up -d

            # Clean up old images
            docker image prune -af --filter "until=72h"

            # Show running containers
            docker compose -f docker-compose.prod.yml ps

      # 7. Notify deployment status
      - name: Deployment Success
        if: success()
        run: echo "✅ Deployment successful!"

      - name: Deployment Failed
        if: failure()
        run: echo "❌ Deployment failed!"
