services:
  postgres:
    image: postgres:16-alpine
    container_name: resume-copilot-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: resume
      POSTGRES_PASSWORD: resume123
      POSTGRES_DB: resume_copilot
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Browserless Chrome for PDF generation (local development)
  chrome:
    image: browserless/chrome:latest
    container_name: resume-copilot-chrome-dev
    restart: unless-stopped
    ports:
      - '3006:3000'
    environment:
      MAX_CONCURRENT_SESSIONS: 3
      CONNECTION_TIMEOUT: 60000
      PREBOOT_CHROME: true
      KEEP_ALIVE: true
      DEFAULT_HEADLESS: true

volumes:
  pgdata:
