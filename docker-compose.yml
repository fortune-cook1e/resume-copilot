services:
  postgres:
    image: postgres:16-alpine
    container_name: resume-copilot-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: resume
      POSTGRES_PASSWORD: resume123
      POSTGRES_DB: resume_copilot
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
