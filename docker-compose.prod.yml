services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: resume-copilot-db-prod
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-resume}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-resume_copilot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - resume-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-resume}']
      interval: 10s
      timeout: 5s
      retries: 5

  # Browserless Chrome for PDF generation (v2)
  # Server: 2 vCPU / 2 GiB — keep Chrome lightweight
  chrome:
    image: browserless/chrome:latest
    container_name: resume-copilot-chrome
    restart: unless-stopped
    ports:
      - '3006:3000'
    networks:
      - resume-network
    environment:
      # Only 1 concurrent session to minimize memory spike
      CONCURRENT: 1
      QUEUED: 3
      # 2 minutes per session before force-kill
      TIMEOUT: 120000
      HEALTH: true
    shm_size: '256m'
    deploy:
      resources:
        limits:
          memory: 512m

  # Resume Copilot Application
  app:
    image: ${ALIYUN_REGISTRY}/resume-copilot:latest
    container_name: resume-copilot-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '3005:3000'
    environment:
      # Database
      DATABASE_URL: postgresql://${DB_USER:-resume}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-resume_copilot}

      # Better Auth
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}

      # Next.js
      NODE_ENV: production
      PORT: ${PORT:-3000}

      # Remote Chrome for PDF generation
      # browserless v2: must use /chrome path
      CHROME_WS_ENDPOINT: ws://chrome:3000/chrome
      # URL that Chrome container uses to reach this app
      CHROME_TARGET_URL: http://app:3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - resume-network
    volumes:
      - app_logs:/app/logs

volumes:
  postgres_data:
    name: resume-copilot-pgdata-prod
  app_logs:
    name: resume-copilot-app-logs

networks:
  resume-network:
    name: resume-copilot-network
    driver: bridge
