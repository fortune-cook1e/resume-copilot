services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: resume-copilot-db-prod
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-resume}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-resume_copilot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - resume-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-resume}']
      interval: 10s
      timeout: 5s
      retries: 5

  # Python AI Service
  ai-service:
    image: ${ALIYUN_REGISTRY}/resume-copilot-ai:latest
    container_name: resume-copilot-ai
    restart: unless-stopped
    ports:
      - '3006:8000'
    environment:
      PYTHONUNBUFFERED: 1
    networks:
      - resume-network
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ai_models:/app/models_cache

  # Resume Copilot Application
  app:
    image: ${ALIYUN_REGISTRY}/resume-copilot:latest
    container_name: resume-copilot-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '3005:3000'
    environment:
      # Database
      DATABASE_URL: postgresql://${DB_USER:-resume}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-resume_copilot}

      # Better Auth
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}

      # Python AI Service
      PYTHON_SERVICE_URL: http://ai-service:8000

      # Next.js
      NODE_ENV: production
      PORT: ${PORT:-3000}
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - resume-network
    volumes:
      - app_logs:/app/logs

volumes:
  postgres_data:
    name: resume-copilot-pgdata-prod
  app_logs:
    name: resume-copilot-app-logs
  ai_models:
    name: resume-copilot-ai-models

networks:
  resume-network:
    name: resume-copilot-network
    driver: bridge
